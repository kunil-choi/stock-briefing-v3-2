name: V3_2 report_update 데이터 생성

on:
  workflow_dispatch:   # stock-briefing-v3-1이 완료 후 dispatch로만 시작한다.
                        # 자체 cron을 두지 않는 이유는 stock-briefing-video의
                        # daily_broadcast.yml과 동일 — V3_1이 끝나기 전에 먼저
                        # 실행되면 raw 데이터가 없어 날짜 불일치가 생길 수 있다.

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 애널리스트 08:00 대기~08:30 강제진행 루프 포함

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 🖋️ 시스템 의존성 설치 (한글 폰트)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            fonts-nanum \
            fonts-nanum-coding \
            libfreetype6-dev \
            libpng-dev \
            pkg-config
          fc-cache -fv || true

      - name: 📦 Python 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎨 Matplotlib 백엔드 설정
        run: |
          mkdir -p ~/.config/matplotlib
          echo "backend: Agg" > ~/.config/matplotlib/matplotlibrc

      - name: 📊 report_update 데이터 생성 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          MPLBACKEND:        Agg
        run: python main.py

      - name: ✅ 결과물 검증
        run: |
          if [ ! -f data/briefing_data.json ]; then
            echo "⚠️ data/briefing_data.json 없음 (V3_1 데이터 미준비로 스킵됐을 수 있음)"
            exit 0
          fi
          echo "✅ briefing_data.json 정상 생성 ($(wc -c < data/briefing_data.json) bytes)"
          if [ ! -f docs/index.html ]; then
            echo "❌ docs/index.html 없음"
            exit 1
          fi
          SIZE=$(wc -c < docs/index.html)
          if [ "$SIZE" -lt 1000 ]; then
            echo "❌ docs/index.html 너무 작음 (${SIZE} bytes)"
            exit 1
          fi
          echo "✅ docs/index.html 정상 생성 (${SIZE} bytes)"

      - name: 🚀 변경사항 커밋 및 푸시
        id: commit_push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ docs/
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️  변경사항 없음 → 커밋 스킵"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "📊 V3_2 report_update 데이터 갱신: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            for i in 1 2 3; do
              git push && break || {
                echo "⚠️  push 실패 (${i}회) → rebase 후 재시도"
                sleep 3
                git pull --rebase origin main || true
              }
            done
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # stock-briefing-step2(report_update.yml, 실제 영상 생성 — OpenAI/TTS 과금 발생)는
      # 더 이상 여기서 자동 트리거하지 않는다. 데이터(docs/index.html)를 사람이 먼저
      # 확인한 뒤 step2 저장소 Actions 탭에서 수동으로 workflow_dispatch 실행한다
      # (과금 방지를 위한 의도적 변경).

      - name: 📋 실행 요약 (항상 출력)
        if: always()
        run: |
          echo "=============================="
          echo "KST 현재시각: $(TZ='Asia/Seoul' date)"
          if [ -f data/briefing_data.json ]; then
            echo "briefing_data.json 크기: $(wc -c < data/briefing_data.json) bytes"
          else
            echo "briefing_data.json: 없음"
          fi
          echo "=============================="
